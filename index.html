<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Democracy</title>

  <!-- SweetAlert2 for dialogs -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="favicon.png" type="image/x-icon">
  <link rel="stylesheet" href="/style.css">
</head>

<body>

  <!-- ── Header ─────────────────────────────────────────────────────────── -->
  <header id="game-header">
    <div class="header-brand">
      <img src="favicon.png" alt="AI Democracy logo">
      <h1>AI Democracy</h1>
    </div>

    <div class="header-stats" id="game-stats" role="region" aria-label="Game statistics">
      <span class="stat-chip" id="stat-round"   aria-label="Current round">Round 1</span>
      <span class="stat-chip" id="stat-credits" aria-label="Available credits">100 Credits</span>
      <span class="stat-chip" id="stat-approval" aria-label="Overall approval">50% Approval</span>
      <span class="stat-chip" id="stat-enacted"  aria-label="Enacted policies">0 Policies</span>
    </div>

    <div class="header-actions">
      <button class="btn-icon" id="info-btn"     title="How to play" aria-label="How to play">&#9432;</button>
      <button class="btn-icon" id="settings-btn" title="Settings"    aria-label="Settings">&#9881;</button>
    </div>
  </header>

  <!-- ── Main ───────────────────────────────────────────────────────────── -->
  <main id="game-main">

    <!-- Left: Metric indicators -->
    <aside id="metrics-panel" class="panel" aria-label="National indicators">
      <div class="panel-header">National Indicators</div>
      <div class="panel-body" id="metrics-list" aria-live="polite"></div>
    </aside>

    <!-- Centre: Policy browser -->
    <section id="policy-browser" aria-label="Policy browser">
      <div class="browser-header">
        <div class="browser-title-row">
          <span class="browser-title">Policy Catalogue</span>
          <input type="search" id="policy-search" placeholder="Search policies…" aria-label="Search policies">
        </div>
        <div id="category-tabs" role="tablist" aria-label="Policy categories"></div>
      </div>
      <div id="policy-grid" role="list" aria-label="Policy cards"></div>
    </section>

    <!-- Right: Voter approval + enacted policies -->
    <aside id="social-panel" class="panel" aria-label="Voter approval and enacted policies">
      <div class="panel-header">Public Approval</div>
      <div class="panel-body" id="voter-list" aria-live="polite"></div>
      <div class="sub-panel-header">Active Policies</div>
      <div class="panel-body" id="enacted-list" style="max-height:35%;border-top:none;" aria-live="polite"></div>
    </aside>

  </main>

  <!-- ── Footer ─────────────────────────────────────────────────────────── -->
  <footer id="game-footer">
    <button id="end-round" aria-label="End the current round">End Round →</button>
  </footer>

  <script type="module" src="/main.js"></script>
</body>
</html>
