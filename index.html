<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Democracy</title>

  <!-- SweetAlert2 for dialogs -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://d3js.org/d3.v7.min.js"></script>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="favicon.png" type="image/x-icon">
  <link rel="stylesheet" href="/style.css">
</head>

<body>

  <!-- ── Header ─────────────────────────────────────────────────────────── -->
  <header id="game-header">
    <div class="header-brand">
      <img src="favicon.png" alt="AI Democracy logo">
      <h1>AI Democracy</h1>
    </div>

    <div class="header-stats" id="game-stats" role="region" aria-label="Game statistics">
      <span class="stat-chip" id="stat-round"   aria-label="Current round">Round 1</span>
      <span class="stat-chip" id="stat-capital" aria-label="Political capital">100 Political Capital</span>
      <span class="stat-chip" id="stat-treasury" aria-label="National treasury">160M Treasury</span>
      <span class="stat-chip" id="stat-approval" aria-label="Overall approval">50% Approval</span>
      <span class="stat-chip" id="stat-enacted"  aria-label="Enacted policies">0 Policies</span>
    </div>

    <div class="header-actions">
      <button class="btn-icon" id="info-btn" title="How to play" aria-label="How to play">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><line x1="12" y1="11" x2="12" y2="16"/><circle cx="12" cy="7.7" r="0.6" fill="currentColor" stroke="none"/></svg>
      </button>
      <button class="btn-icon" id="settings-btn" title="Settings" aria-label="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>
  </header>

  <!-- ── Goal / mandate banner ──────────────────────────────────────────── -->
  <div id="goal-banner" aria-label="Government mandate"></div>

  <!-- ── Main ───────────────────────────────────────────────────────────── -->
  <main id="game-main">

    <!-- Left: Metric indicators -->
    <aside id="metrics-panel" class="panel" aria-label="National indicators">
      <div class="panel-header">National Indicators</div>
      <div class="panel-body" id="metrics-list" aria-live="polite"></div>
    </aside>

    <!-- Centre: Policy wheel -->
    <section id="policy-wheel-section" aria-label="Policy wheel">
      <div class="wheel-toolbar">
        <span class="wheel-hint">Click the centre or “Add Policy” to govern · click a node to set its level · click a sector to browse</span>
      </div>
      <div id="svg-container" aria-label="Policy category wheel"></div>
    </section>

    <!-- Right: Voter approval -->
    <aside id="social-panel" class="panel" aria-label="Public approval by voter group">
      <div class="panel-header">Public Approval</div>
      <div class="panel-body" id="voter-list" aria-live="polite"></div>
    </aside>

  </main>

  <!-- ── Footer ─────────────────────────────────────────────────────────── -->
  <footer id="game-footer">
    <div class="footer-actions">
      <button id="add-policy-btn" class="footer-btn" aria-label="Add a policy">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>Add Policy</button>
      <button id="give-speech" class="footer-btn" aria-label="Give a speech">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 10v4l11 4V6z"/><path d="M15 8.5a3 3 0 0 1 0 7"/><line x1="6" y1="14.5" x2="7" y2="20"/></svg>Speech</button>
      <button id="open-cabinet" class="footer-btn" aria-label="Open cabinet">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18M4 9l8-5 8 5"/><line x1="6" y1="9" x2="6" y2="21"/><line x1="10" y1="9" x2="10" y2="21"/><line x1="14" y1="9" x2="14" y2="21"/><line x1="18" y1="9" x2="18" y2="21"/></svg>Cabinet</button>
      <button id="open-budget" class="footer-btn" aria-label="View the budget">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="20" x2="20" y2="20"/><rect x="6" y="11" width="3" height="8"/><rect x="11" y="6" width="3" height="13"/><rect x="16" y="14" width="3" height="5"/></svg>Budget</button>
      <button id="open-overton" class="footer-btn" aria-label="View the Overton window">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M15.6 8.4l-2.1 5.1-5.1 2.1 2.1-5.1z"/></svg>Overton</button>
    </div>
    <button id="end-round" aria-label="End the current round">End Round →</button>
  </footer>

  <script type="module" src="/main.js"></script>
</body>
</html>
